name: Vehimap .NET Desktop

on:
  push:
    paths:
      - "dotnet/**"
      - ".github/workflows/dotnet-desktop.yml"
  pull_request:
    paths:
      - "dotnet/**"
      - ".github/workflows/dotnet-desktop.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore Vehimap.sln
      - name: Test
        run: dotnet test Vehimap.sln --no-restore --configuration Release

  publish:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: vehimap-desktop-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: vehimap-desktop-linux-x64
          - os: macos-13
            rid: osx-x64
            artifact: vehimap-desktop-osx-x64
          - os: macos-14
            rid: osx-arm64
            artifact: vehimap-desktop-osx-arm64
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Publish desktop shell
        run: dotnet publish src/Vehimap.Desktop/Vehimap.Desktop.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o artifacts/${{ matrix.rid }}/desktop
      - name: Publish updater
        run: dotnet publish src/Vehimap.Updater/Vehimap.Updater.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o artifacts/${{ matrix.rid }}/updater
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dotnet/artifacts/${{ matrix.rid }}
