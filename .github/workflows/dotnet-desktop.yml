name: Vehimap .NET Desktop

on:
  push:
    paths:
      - "dotnet/**"
      - ".github/workflows/dotnet-desktop.yml"
      - "src/VERSION"
      - "update/latest-dotnet-*.ini"
    tags:
      - "dotnet-v*"
      - "dotnet-beta-v*"
      - "dotnet-nightly"
  pull_request:
    paths:
      - "dotnet/**"
      - ".github/workflows/dotnet-desktop.yml"
      - "src/VERSION"
      - "update/latest-dotnet-*.ini"
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Desktop release channel"
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - beta
          - nightly

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      effective_version: ${{ steps.version.outputs.effective_version }}
      channel: ${{ steps.version.outputs.channel }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
      - id: version
        shell: bash
        run: |
          version="$(tr -d '\r\n' < src/VERSION)"
          effective_version="${version}"
          channel="stable"
          prerelease="false"
          should_release="false"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            channel="${{ inputs.release_channel }}"
            if [[ "${channel}" == "nightly" ]]; then
              prerelease="true"
              should_release="true"
            fi
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            channel="nightly"
            prerelease="true"
            should_release="true"
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            case "${GITHUB_REF_NAME}" in
              "dotnet-v${version}")
                channel="stable"
                prerelease="false"
                ;;
              "dotnet-beta-v${version}")
                channel="beta"
                prerelease="true"
                ;;
              "dotnet-nightly")
                channel="nightly"
                prerelease="true"
                ;;
              *)
                echo "Tag ${GITHUB_REF_NAME} neodpovida podporovanemu .NET desktop release kanalu pro verzi ${version}." >&2
                exit 1
                ;;
            esac
            should_release="true"
          fi

          if [[ "${channel}" == "nightly" ]]; then
            effective_version="${version}-nightly.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
            prerelease="true"
          fi

          case "${channel}" in
            stable)
              release_tag="dotnet-v${version}"
              release_name="Vehimap Desktop ${version}"
              ;;
            beta)
              release_tag="dotnet-beta-v${version}"
              release_name="Vehimap Desktop Beta ${version}"
              prerelease="true"
              ;;
            nightly)
              release_tag="dotnet-nightly"
              release_name="Vehimap Desktop Nightly ${effective_version}"
              prerelease="true"
              ;;
            *)
              echo "Nepodporovany release channel: ${channel}" >&2
              exit 1
              ;;
          esac

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "${release_tag}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} neodpovida ocekavanemu release tagu ${release_tag}." >&2
              exit 1
            fi
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "effective_version=${effective_version}" >> "$GITHUB_OUTPUT"
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

  test:
    needs: metadata
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore Vehimap.sln
      - name: Build
        run: dotnet build Vehimap.sln --no-restore --configuration Release -p:UseSharedCompilation=false
      - name: Install Inno Setup for packaging tests
        shell: pwsh
        run: choco install innosetup -y --no-progress
      - name: Test
        run: dotnet test Vehimap.sln --no-build --configuration Release -p:UseSharedCompilation=false

  ui-smoke:
    needs:
      - metadata
      - test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dotnet
    env:
      APPIUM_HOME: ${{ github.workspace }}\dotnet\artifacts\appium-home-ci
      VEHIMAP_APPIUM_SERVER_URL: http://127.0.0.1:4723/
      VEHIMAP_UI_APP: ${{ github.workspace }}\dotnet\artifacts\desktop-release\Vehimap.Desktop.exe
      VEHIMAP_UI_REQUIRE_APPIUM: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Restore
        run: dotnet restore Vehimap.sln
      - name: Build
        run: dotnet build Vehimap.sln --no-restore --configuration Release -p:UseSharedCompilation=false
      - name: Publish desktop release for UI smoke
        run: dotnet publish src/Vehimap.Desktop/Vehimap.Desktop.csproj -c Release -r win-x64 --self-contained true -p:UseSharedCompilation=false -p:VehimapReleaseChannel=${{ needs.metadata.outputs.channel }} -p:VehimapVersion=${{ needs.metadata.outputs.effective_version }} -o artifacts/desktop-release
      - name: Install Appium Windows driver and WinAppDriver
        shell: pwsh
        run: |
          npm install -g appium
          appium driver install windows
          appium driver run windows install-wad
      - name: Run Appium UI smoke
        shell: pwsh
        run: |
          $stdoutLog = Join-Path $env:GITHUB_WORKSPACE "dotnet\\artifacts\\appium-server.log"
          $stderrLog = Join-Path $env:GITHUB_WORKSPACE "dotnet\\artifacts\\appium-server.err.log"

          if (-not (Test-Path -LiteralPath $env:VEHIMAP_UI_APP)) {
            throw "Chybi publish build pro UI smoke: $env:VEHIMAP_UI_APP"
          }

          $appiumProcess = Start-Process -FilePath "appium.cmd" -ArgumentList @("--address", "127.0.0.1", "--port", "4723") -PassThru -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog
          try {
            $deadline = (Get-Date).AddMinutes(2)
            $ready = $false
            while ((Get-Date) -lt $deadline) {
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:4723/status" -UseBasicParsing -TimeoutSec 5
                if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 300) {
                  $ready = $true
                  break
                }
              }
              catch {
              }

              Start-Sleep -Seconds 2
            }

            if (-not $ready) {
              throw "Appium server se v limitu nespustil."
            }

            dotnet test tests/Vehimap.Tests.UI/Vehimap.Tests.UI.csproj --no-build --configuration Release -p:UseSharedCompilation=false --filter "UiProfile=Smoke"
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
          finally {
            if ($appiumProcess -and -not $appiumProcess.HasExited) {
              Stop-Process -Id $appiumProcess.Id -Force
            }
          }
      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vehimap-desktop-ui-smoke-logs
          path: |
            dotnet/artifacts/appium-server.log
            dotnet/artifacts/appium-server.err.log

  publish:
    needs:
      - metadata
      - test
      - ui-smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: vehimap-desktop-release-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: vehimap-desktop-release-linux-x64
          - os: macos-15-intel
            rid: osx-x64
            artifact: vehimap-desktop-release-osx-x64
          - os: macos-14
            rid: osx-arm64
            artifact: vehimap-desktop-release-osx-arm64
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Install Inno Setup
        if: startsWith(matrix.rid, 'win-')
        shell: pwsh
        run: choco install innosetup -y --no-progress
      - name: Publish desktop shell
        run: dotnet publish src/Vehimap.Desktop/Vehimap.Desktop.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:UseSharedCompilation=false -p:VehimapReleaseChannel=${{ needs.metadata.outputs.channel }} -p:VehimapVersion=${{ needs.metadata.outputs.effective_version }} -o artifacts/${{ matrix.rid }}/desktop
      - name: Package release artifact
        shell: pwsh
        run: >
          ./build/Package-DesktopRelease.ps1
          -PublishDirectory "artifacts/${{ matrix.rid }}/desktop"
          -RuntimeIdentifier "${{ matrix.rid }}"
          -Version "${{ needs.metadata.outputs.effective_version }}"
          -OutputDirectory "artifacts/${{ matrix.rid }}/release"
          -Channel "${{ needs.metadata.outputs.channel }}"
      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dotnet/artifacts/${{ matrix.rid }}/release/*

  release:
    if: needs.metadata.outputs.should_release == 'true'
    needs:
      - metadata
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: vehimap-desktop-release-*
          merge-multiple: true
      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.metadata.outputs.release_tag }}"
          name="${{ needs.metadata.outputs.release_name }}"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes
          fi

          notes_file="$(mktemp)"
          cat > "$notes_file" <<'EOF'
          Desktop release build pro .NET/Avalonia vetev Vehimapu.

          Artefakty:
          - Windows: Inno Setup installer
          - Linux: tar.gz portable slozky
          - macOS: ZIP s `.app` bundle
          EOF

          prerelease_args=()
          if [[ "${{ needs.metadata.outputs.prerelease }}" == "true" ]]; then
            prerelease_args+=(--prerelease)
          fi

          gh release create "$tag" release-artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$name" \
            --generate-notes \
            --notes-file "$notes_file" \
            "${prerelease_args[@]}"

  update-manifests:
    if: needs.metadata.outputs.should_release == 'true'
    needs:
      - metadata
      - release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: vehimap-desktop-release-*
          merge-multiple: true
      - name: Generate runtime-specific desktop manifests
        shell: pwsh
        run: |
          $metadataFiles = Get-ChildItem -Path "release-artifacts" -Filter "*.json" | Sort-Object Name
          if ($metadataFiles.Count -eq 0) {
            throw "Nebyla nalezena zadna package metadata."
          }

          foreach ($metadataFile in $metadataFiles) {
            $metadata = Get-Content -Raw -LiteralPath $metadataFile.FullName | ConvertFrom-Json
            $rid = $metadata.runtimeIdentifier
            if ([string]::IsNullOrWhiteSpace($rid)) {
              throw "Metadata '$($metadataFile.Name)' neobsahuji runtimeIdentifier."
            }

            $channel = "${{ needs.metadata.outputs.channel }}"
            if ([string]::IsNullOrWhiteSpace($channel) -or $channel -eq "stable") {
              $outputPath = Join-Path "update" ("latest-dotnet-" + $rid + ".ini")
            }
            else {
              $outputPath = Join-Path "update" ("latest-dotnet-" + $channel + "-" + $rid + ".ini")
            }

            .\dotnet\build\Write-DotnetUpdateManifest.ps1 `
              -PackageMetadataPath $metadataFile.FullName `
              -ArtifactsDirectory "release-artifacts" `
              -ReleaseTag "${{ needs.metadata.outputs.release_tag }}" `
              -OutputPath $outputPath

            if ($channel -eq "stable") {
              # Legacy alias for already published desktop preview builds. New builds use latest-dotnet-<rid>.ini.
              $legacyPreviewOutputPath = Join-Path "update" ("latest-dotnet-preview-" + $rid + ".ini")
              Copy-Item -LiteralPath $outputPath -Destination $legacyPreviewOutputPath -Force
            }
          }
      - name: Verify AHK retirement readiness after manifest generation
        shell: pwsh
        run: |
          if ("${{ needs.metadata.outputs.channel }}" -eq "stable") {
            .\dotnet\build\Get-AhkRetirementReadiness.ps1 -RuntimeIdentifier win-x64 -FailOnBlockers
          }
          else {
            Write-Host "AHK retirement readiness se spousti jen pro stable kanal."
          }
      - name: Commit desktop manifests
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $status = git status --porcelain -- update
          if ([string]::IsNullOrWhiteSpace($status)) {
            Write-Host "Desktop manifests jsou aktualni."
            exit 0
          }

          git add update/latest-dotnet-*.ini
          git commit -m "chore(dotnet): update ${{ needs.metadata.outputs.channel }} desktop manifests for ${{ needs.metadata.outputs.effective_version }}"
          git push origin HEAD:main
