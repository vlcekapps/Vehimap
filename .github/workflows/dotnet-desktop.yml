name: Vehimap .NET Desktop

on:
  push:
    paths:
      - "dotnet/**"
      - ".github/workflows/dotnet-desktop.yml"
    tags:
      - "dotnet-preview-v*"
  pull_request:
    paths:
      - "dotnet/**"
      - ".github/workflows/dotnet-desktop.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          version="$(tr -d '\r\n' < src/VERSION)"
          release_tag="dotnet-preview-v${version}"
          release_name="Vehimap Desktop Preview ${version}"
          should_release="false"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "${release_tag}" ]]; then
              echo "Tag ${GITHUB_REF_NAME} neodpovida ocekavane verzi ${release_tag}." >&2
              exit 1
            fi
            should_release="true"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

  test:
    needs: metadata
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore Vehimap.sln
      - name: Build
        run: dotnet build Vehimap.sln --no-restore --configuration Release -p:UseSharedCompilation=false
      - name: Test
        run: dotnet test Vehimap.sln --no-build --configuration Release -p:UseSharedCompilation=false

  ui-smoke:
    needs:
      - metadata
      - test
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dotnet
    env:
      APPIUM_HOME: ${{ github.workspace }}\dotnet\artifacts\appium-home-ci
      VEHIMAP_APPIUM_SERVER_URL: http://127.0.0.1:4723/
      VEHIMAP_UI_APP: ${{ github.workspace }}\dotnet\artifacts\desktop-preview\Vehimap.Desktop.exe
      VEHIMAP_UI_REQUIRE_APPIUM: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Restore
        run: dotnet restore Vehimap.sln
      - name: Build
        run: dotnet build Vehimap.sln --no-restore --configuration Release -p:UseSharedCompilation=false
      - name: Publish desktop preview for UI smoke
        run: dotnet publish src/Vehimap.Desktop/Vehimap.Desktop.csproj -c Release -r win-x64 --self-contained true -p:UseSharedCompilation=false -o artifacts/desktop-preview
      - name: Install Appium Windows driver and WinAppDriver
        shell: pwsh
        run: |
          npm install -g appium
          appium driver install windows
          appium driver run windows install-wad
      - name: Start Appium server
        shell: pwsh
        run: |
          $stdoutLog = Join-Path $env:GITHUB_WORKSPACE "dotnet\\artifacts\\appium-server.log"
          $stderrLog = Join-Path $env:GITHUB_WORKSPACE "dotnet\\artifacts\\appium-server.err.log"
          Start-Process -FilePath "appium.cmd" -ArgumentList @("--address", "127.0.0.1", "--port", "4723") -PassThru -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog | Out-Null
          $deadline = (Get-Date).AddMinutes(2)
          $ready = $false
          while ((Get-Date) -lt $deadline) {
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:4723/status" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 300) {
                $ready = $true
                break
              }
            }
            catch {
            }

            Start-Sleep -Seconds 2
          }

          if (-not $ready) {
            throw "Appium server se v limitu nespustil."
          }
      - name: Verify UI smoke prerequisites
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath $env:VEHIMAP_UI_APP)) {
            throw "Chybi publish build pro UI smoke: $env:VEHIMAP_UI_APP"
          }
      - name: Run Appium UI smoke
        run: dotnet test tests/Vehimap.Tests.UI/Vehimap.Tests.UI.csproj --no-build --configuration Release -p:UseSharedCompilation=false
      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vehimap-desktop-ui-smoke-logs
          path: |
            dotnet/artifacts/appium-server.log
            dotnet/artifacts/appium-server.err.log

  publish:
    needs:
      - metadata
      - test
      - ui-smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: vehimap-desktop-preview-win-x64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: vehimap-desktop-preview-linux-x64
          - os: macos-13
            rid: osx-x64
            artifact: vehimap-desktop-preview-osx-x64
          - os: macos-14
            rid: osx-arm64
            artifact: vehimap-desktop-preview-osx-arm64
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Publish desktop shell
        run: dotnet publish src/Vehimap.Desktop/Vehimap.Desktop.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:UseSharedCompilation=false -o artifacts/${{ matrix.rid }}/desktop
      - name: Package release artifact
        shell: pwsh
        run: >
          ./build/Package-DesktopRelease.ps1
          -PublishDirectory "artifacts/${{ matrix.rid }}/desktop"
          -RuntimeIdentifier "${{ matrix.rid }}"
          -Version "${{ needs.metadata.outputs.version }}"
          -OutputDirectory "artifacts/${{ matrix.rid }}/release"
      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dotnet/artifacts/${{ matrix.rid }}/release/*

  release:
    if: needs.metadata.outputs.should_release == 'true'
    needs:
      - metadata
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: vehimap-desktop-preview-*
          merge-multiple: true
      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          name: ${{ needs.metadata.outputs.release_name }}
          draft: true
          generate_release_notes: true
          body: |
            Desktop preview build pro .NET/Avalonia vetev Vehimapu.

            Artefakty:
            - Windows: ZIP portable slozky
            - Linux: tar.gz portable slozky
            - macOS: ZIP s `.app` bundle
          files: |
            release-artifacts/*

  update-manifests:
    if: needs.metadata.outputs.should_release == 'true'
    needs:
      - metadata
      - release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: vehimap-desktop-preview-*
          merge-multiple: true
      - name: Generate runtime-specific preview manifests
        shell: pwsh
        run: |
          $metadataFiles = Get-ChildItem -Path "release-artifacts" -Filter "*.json" | Sort-Object Name
          if ($metadataFiles.Count -eq 0) {
            throw "Nebyla nalezena zadna package metadata."
          }

          foreach ($metadataFile in $metadataFiles) {
            $metadata = Get-Content -Raw -LiteralPath $metadataFile.FullName | ConvertFrom-Json
            $rid = $metadata.runtimeIdentifier
            if ([string]::IsNullOrWhiteSpace($rid)) {
              throw "Metadata '$($metadataFile.Name)' neobsahuji runtimeIdentifier."
            }

            $outputPath = Join-Path "update" ("latest-dotnet-preview-" + $rid + ".ini")
            .\dotnet\build\Write-DotnetPreviewUpdateManifest.ps1 `
              -PackageMetadataPath $metadataFile.FullName `
              -ArtifactsDirectory "release-artifacts" `
              -ReleaseTag "${{ needs.metadata.outputs.release_tag }}" `
              -OutputPath $outputPath
          }
      - name: Commit preview manifests
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          $status = git status --porcelain -- update
          if ([string]::IsNullOrWhiteSpace($status)) {
            Write-Host "Preview manifests jsou aktualni."
            exit 0
          }

          git add update/latest-dotnet-preview-*.ini
          git commit -m "chore(dotnet): update desktop preview manifests for ${{ needs.metadata.outputs.version }}"
          git push origin HEAD:main
